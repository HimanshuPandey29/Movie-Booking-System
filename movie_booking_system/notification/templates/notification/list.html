{% extends 'base.html' %}

{% block title %}Notifications{% endblock %}

{% block content %}
<h2>Notifications</h2>
<div class="notifications">
    {% for notification in notifications %}
    <div class="card {% if not notification.is_read %}unread{% endif %}">
        <p>{{ notification.message }}</p>
        <small>{{ notification.created_at }}</small>
        {% if not notification.is_read %}
        <a href="{% url 'notification:mark_read' notification.pk %}" class="btn">Mark as Read</a>
        {% endif %}
    </div>
    {% endfor %}
</div>
{% endblock %}
