{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container">
    <div class="card auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to your account</p>
        </div>

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn auth-btn">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'user:register' %}">Sign up</a></p>
        </div>
    </div>
</div>

<style>
.auth-card {
    max-width: 400px;
    margin: 2rem auto;
    text-align: center;
}

.auth-header h2 {
    color: #1c1c1c;
    margin-bottom: 0.5rem;
}

.auth-header p {
    color: #666;
    margin-bottom: 2rem;
}

.auth-form {
    margin-bottom: 2rem;
}

.auth-btn {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
}

.auth-footer {
    border-top: 1px solid #e0e0e0;
    padding-top: 1.5rem;
}

.auth-footer a {
    color: #ff4d4d;
    text-decoration: none;
    font-weight: 500;
}

.auth-footer a:hover {
    text-decoration: underline;
}
</style>
{% endblock %}
